<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Neon Arena Prototype</title>
    <meta
      name="description"
      content="Mobile-first 3D arena shooter prototype with third-person controls."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="Neon Arena"></canvas>

      <div id="hud" class="panel">
        <div class="hud-top">
          <div>
            <p class="label">MODE</p>
            <p id="mode-name">Prototype: Movement</p>
          </div>
          <div class="timer-wrap">
            <p class="label">MATCH</p>
            <p id="match-timer">00:00</p>
          </div>
        </div>
        <div class="hud-bottom">
          <div>
            <p class="label">HERO</p>
            <p id="hero-name">Vanguard</p>
          </div>
          <div class="health-wrap">
            <p class="label">HP</p>
            <div class="health-track"><div id="hero-health" class="health-fill"></div></div>
          </div>
        </div>
      </div>

      <div id="touch-layer" aria-hidden="false">
        <div id="move-zone" class="touch-zone left">
          <div id="move-stick" class="stick">
            <div class="stick-core"></div>
          </div>
          <p class="zone-label">MOVE</p>
        </div>

        <div id="aim-zone" class="touch-zone right">
          <div id="aim-stick" class="stick">
            <div class="stick-core"></div>
          </div>
          <p class="zone-label">LOOK</p>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
